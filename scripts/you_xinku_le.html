<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你辛苦了</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  min-height:100vh;
  display:flex;justify-content:center;align-items:center;
  background:#1a1a2e;
  font-family:"Microsoft YaHei",sans-serif;
}
canvas{
  border-radius:20px;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  max-width:100vw;
  max-height:100vh;
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const c=document.getElementById('c'),ctx=c.getContext('2d');
c.width=800;c.height=600;
let t=0;

function draw(){
  t+=0.02;
  ctx.clearRect(0,0,800,600);

  // 天空渐变
  let sky=ctx.createLinearGradient(0,0,0,400);
  sky.addColorStop(0,'#87CEEB');
  sky.addColorStop(0.6,'#E0F7FA');
  ctx.fillStyle=sky;
  ctx.fillRect(0,0,800,400);

  // 地面
  let grd=ctx.createLinearGradient(0,400,0,600);
  grd.addColorStop(0,'#66BB6A');
  grd.addColorStop(1,'#388E3C');
  ctx.fillStyle=grd;
  ctx.fillRect(0,400,800,200);

  // 云朵
  ctx.fillStyle='rgba(255,255,255,0.8)';
  for(let x of[120,300,550,680]){
    let cy=60+Math.sin(t+x/100)*8;
    ctx.beginPath();
    ctx.arc(x,cy,30,0,Math.PI*2);
    ctx.arc(x+30,cy-8,25,0,Math.PI*2);
    ctx.arc(x+50,cy,28,0,Math.PI*2);
    ctx.fill();
  }

  // 太阳
  let sx=700,sy=70;
  ctx.beginPath();
  ctx.arc(sx,sy,35,0,Math.PI*2);
  ctx.fillStyle='#FFF176';
  ctx.fill();
  ctx.shadowColor='#FFF176';
  ctx.shadowBlur=40;
  ctx.fill();
  ctx.shadowBlur=0;

  // ── 小孩（左）──
  let cx=200,cy=330;
  let armAngle=Math.sin(t*2)*0.3;

  // 身体
  ctx.fillStyle='#FFF9C4';
  ctx.fillRect(cx-18,cy+40,36,45);

  // 头
  ctx.fillStyle='#FFCCBC';
  ctx.beginPath();
  ctx.arc(cx,cy+20,23,0,Math.PI*2);
  ctx.fill();

  // 头发
  ctx.fillStyle='#5D4037';
  ctx.beginPath();
  ctx.arc(cx,cy+8,26,Math.PI,Math.PI*2);
  ctx.fill();

  // 眼睛
  ctx.fillStyle='#333';
  ctx.beginPath();
  ctx.arc(cx-8,cy+17,3,0,Math.PI*2);
  ctx.arc(cx+8,cy+17,3,0,Math.PI*2);
  ctx.fill();

  // 微笑
  ctx.strokeStyle='#E53935';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(cx,cy+25,8,0.1*Math.PI,0.9*Math.PI);
  ctx.stroke();

  // 左手（伸向大人）
  ctx.strokeStyle='#FFCCBC';
  ctx.lineWidth=12;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(cx+18,cy+55);
  let reachX=cx+40+Math.sin(t*2)*15;
  let reachY=cy+50-Math.sin(t*2)*5;
  ctx.lineTo(reachX,reachY);
  ctx.stroke();

  // 右手
  ctx.beginPath();
  ctx.moveTo(cx-18,cy+55);
  ctx.lineTo(cx-40,cy+65);
  ctx.stroke();

  // 腿
  ctx.strokeStyle='#5D4037';
  ctx.lineWidth=7;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(cx-8,cy+85);
  ctx.lineTo(cx-12,cy+105);
  ctx.moveTo(cx+8,cy+85);
  ctx.lineTo(cx+12,cy+105);
  ctx.stroke();

  // ── 大人（右）──
  let ax=550,ay=320;
  let adultBob=Math.sin(t)*2;

  // 身体（西装）
  ctx.fillStyle='#1565C0';
  ctx.fillRect(ax-22,ay+40+adultBob,44,55);
  // 领带
  ctx.fillStyle='#C62828';
  ctx.fillRect(ax-3,ay+45+adultBob,6,20);

  // 头
  ctx.fillStyle='#FFE0B2';
  ctx.beginPath();
  ctx.arc(ax,ay+18+adultBob,26,0,Math.PI*2);
  ctx.fill();

  // 头发
  ctx.fillStyle='#4E342E';
  ctx.beginPath();
  ctx.arc(ax,ay+6+adultBob,29,Math.PI,Math.PI*2);
  ctx.fill();

  // 眼睛
  ctx.fillStyle='#333';
  ctx.beginPath();
  ctx.arc(ax-10,ay+16+adultBob,3,0,Math.PI*2);
  ctx.arc(ax+10,ay+16+adultBob,3,0,Math.PI*2);
  ctx.fill();

  // 微笑
  ctx.strokeStyle='#E53935';
  ctx.lineWidth=2;
  ctx.beginPath();
  ctx.arc(ax,ay+26+adultBob,9,0.1*Math.PI,0.9*Math.PI);
  ctx.stroke();

  // 手臂（自然垂放）
  ctx.strokeStyle='#FFE0B2';
  ctx.lineWidth=12;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(ax+22,ay+50+adultBob);
  ctx.lineTo(ax+40,ay+75+adultBob);
  ctx.moveTo(ax-22,ay+50+adultBob);
  ctx.lineTo(ax-40,ay+75+adultBob);
  ctx.stroke();

  // 腿
  ctx.strokeStyle='#37474F';
  ctx.lineWidth=8;
  ctx.lineCap='round';
  ctx.beginPath();
  ctx.moveTo(ax-10,ay+95+adultBob);
  ctx.lineTo(ax-14,ay+115+adultBob);
  ctx.moveTo(ax+10,ay+95+adultBob);
  ctx.lineTo(ax+14,ay+115+adultBob);
  ctx.stroke();

  // ── 对话框 ──
  let bubbleAlpha=Math.sin(t*0.8)>0.3?1:0;
  if(bubbleAlpha>0){
    ctx.globalAlpha=Math.min(1,(Math.sin(t*0.8)-0.3)/0.7);
    ctx.fillStyle='white';
    ctx.strokeStyle='#ddd';
    ctx.lineWidth=2;
    roundRect(ctx,560,80,180,70,20);
    ctx.fill();ctx.stroke();
    // 三角
    ctx.beginPath();
    ctx.moveTo(560+30,150);
    ctx.lineTo(560+50,165);
    ctx.lineTo(560+50,150);
    ctx.fill();
    // 文字
    ctx.fillStyle='#333';
    ctx.font='bold 24px "Microsoft YaHei",sans-serif';
    ctx.textAlign='center';
    ctx.fillText('你辛苦了',650,122);
    ctx.font='18px sans-serif';
    ctx.fillText('💪',650,148);
    ctx.globalAlpha=1;
  }

  // ── 爱心 ──
  let heartPhase=Math.sin(t*2);
  if(heartPhase>0.3){
    ctx.globalAlpha=(heartPhase-0.3)/0.7;
    ctx.font='28px sans-serif';
    ctx.textAlign='center';
    ctx.fillText('❤️',cx+80+Math.sin(t*3)*10,cy-20-Math.sin(t*2)*15);
    ctx.globalAlpha=1;
  }

  // ── 底部文字 ──
  ctx.fillStyle='rgba(255,255,255,0.7)';
  ctx.font='15px "Microsoft YaHei",sans-serif';
  ctx.textAlign='center';
  ctx.fillText('小时候的我，摸摸长大的自己',400,580);

  requestAnimationFrame(draw);
}

function roundRect(ctx,x,y,w,h,r){
  ctx.beginPath();
  ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);
  ctx.closePath();
}

draw();
</script>
</body>
</html>
