# arXiv 论文自动追踪工作流
# 每天定时搜索 arXiv 最新论文 → AI 分析 → 自动创建 GitHub Issue
#
# 使用前需要在仓库 Secrets 中设置:
#   GH_TOKEN: GitHub Personal Access Token
#   DEEPSEEK_API_KEY: DeepSeek API Key (可选，否则使用默认)
#
# 也可以手动触发: Actions → arXiv Daily → Run workflow

name: arXiv Daily Paper Tracker

on:
  schedule:
    # 每天 UTC 0 点 (= 北京时间早上 8 点) 运行
    - cron: '0 0 * * *'
  workflow_dispatch:
    inputs:
      topics:
        description: '搜索主题 (JSON格式，如 [{"query":"transformer","label":"NLP","max":3}])'
        required: false
        default: '[{"query":"large language model","label":"LLM","max":3},{"query":"reinforcement learning","label":"RL","max":3}]'
      days_back:
        description: '搜索几天内的论文'
        required: false
        default: '7'

jobs:
  tracker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 安装依赖
        run: |
          npm init -y
          npm install axios

      - name: 搜索 arXiv 并创建 Issue
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN || secrets.GITHUB_TOKEN }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          # 默认主题
          TOPICS='${{ github.event.inputs.topics }}'
          if [ -z "$TOPICS" ] || [ "$TOPICS" = "" ]; then
            TOPICS='[{"query":"large language model","label":"LLM","max":3},{"query":"reinforcement learning","label":"RL","max":3}]'
          fi
          DAYS='${{ github.event.inputs.days_back }}'
          [ -z "$DAYS" ] && DAYS=7

          echo "📡 搜索主题: $TOPICS"
          echo "📅 天数范围: $DAYS"

          node -e "
          const axios = require('axios');
          const {Octokit} = require('octokit');
          const [owner, repo] = process.env.GITHUB_REPOSITORY.split('/');
          const gh = new Octokit({auth: process.env.GH_TOKEN});
          const topics = JSON.parse(process.env.TOPICS || '$(echo $TOPICS)');
          const daysBack = parseInt('$DAYS');

          async function searchArxiv(query, max) {
            const url = 'https://export.arxiv.org/api/query?search_query=all:' +
                        encodeURIComponent(query) +
                        '&start=0&max_results=' + max +
                        '&sortBy=submittedDate&sortOrder=descending';
            const resp = await axios.get(url, {timeout:30000});
            const entries = resp.data.split('<entry>').slice(1);
            return entries.map(e => {
              const extract = (tag) => {
                const m = e.match(new RegExp('<'+tag+'[^>]*>(.*?)</'+tag+'>','s'));
                return m ? m[1].trim().replace(/\\s+/g,' ') : '';
              };
              const id = extract('id').replace(/https?:\\/\\/arxiv\\.org\\/abs\\//,'');
              const authors = [];
              const am = e.matchAll(/<author>[\\s\\S]*?<name>(.*?)<\\/name>[\\s\\S]*?<\\/author>/g);
              for(const m of am) authors.push(m[1].trim());
              return {
                id, title: extract('title'), authors,
                abstract: extract('summary').replace(/\\s+/g,' '),
                published: extract('published').split('T')[0],
                pdfUrl: 'https://arxiv.org/pdf/'+id+'.pdf',
                absUrl: 'https://arxiv.org/abs/'+id,
              };
            });
          }

          async function summarizePaper(llm, title, abstract) {
            if (!llm) return '(AI 分析未配置)';
            try {
              const resp = await axios.post('https://api.deepseek.com/v1/chat/completions', {
                model: 'deepseek-chat',
                messages: [
                  {role:'system',content:'用中文简要分析论文。输出：核心贡献、方法、关键发现。限150字。'},
                  {role:'user',content:'标题: '+title+'\\n摘要: '+abstract}
                ]
              }, {headers:{Authorization:'Bearer '+process.env.DEEPSEEK_API_KEY}});
              return resp.data.choices[0].message.content;
            } catch(e) {
              return '(AI 分析失败: '+e.message+')';
            }
          }

          async function run() {
            const llm = process.env.DEEPSEEK_API_KEY ? true : null;
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - daysBack);

            for (const topic of topics) {
              console.log('\\n📡 ['+topic.label+'] 搜索: '+topic.query);
              const papers = await searchArxiv(topic.query, topic.max||3);
              // 过滤日期
              const recent = papers.filter(p => {
                if (!p.published) return true;
                return new Date(p.published) >= cutoff;
              });
              console.log('   找到 '+papers.length+' 篇，最近 '+daysBack+'天: '+recent.length+' 篇');

              for (const paper of recent) {
                console.log('   🤖 分析: '+paper.title.slice(0,60)+'...');
                const analysis = await summarizePaper(llm, paper.title, paper.abstract);

                const body = '## '+paper.title+'\\n\\n' +
                  '**arXiv 自动追踪** · 标签: \\`'+topic.label+'\\`\\n\\n' +
                  '| 字段 | 内容 |\\n|------|------|\\n' +
                  '| 📄 标题 | '+paper.title+' |\\n' +
                  '| 👥 作者 | '+paper.authors.slice(0,5).join('; ')+' |\\n' +
                  '| 📅 日期 | '+paper.published+' |\\n' +
                  '| 🔗 链接 | [摘要]('+paper.absUrl+') · [PDF]('+paper.pdfUrl+') |\\n\\n' +
                  '### 📝 摘要\\n'+(paper.abstract||'(无)').slice(0,1500)+'\\n\\n' +
                  '### 🤖 AI 分析\\n'+analysis+'\\n\\n' +
                  '*由 GitHub Agent 自动创建 · '+new Date().toISOString().split('T')[0]+'*';

                try {
                  const {data} = await gh.rest.issues.create({
                    owner, repo,
                    title: '📄 ['+topic.label+'] '+paper.title,
                    body,
                    labels: ['paper', topic.label, 'arxiv-auto'],
                  });
                  console.log('   ✅ Issue #'+data.number+' 已创建');
                } catch(e) {
                  console.error('   ❌ 创建失败: '+e.message);
                }
              }
            }
            console.log('\\n✅ 追踪完成!');
          }

          run().catch(e => { console.error('❌ 错误:', e.message); process.exit(1); });
          "
