<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>你辛苦了</title>
<style>
*{margin:0;padding:0}
body{
  overflow:hidden;background:#000;
  display:flex;justify-content:center;align-items:center;
  min-height:100vh;
}
canvas{display:block}
</style>
</head>
<body>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { CSS2DRenderer, CSS2DObject } from 'three/addons/renderers/CSS2DRenderer.js';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0a1a);
scene.fog = new THREE.Fog(0x0a0a1a, 20, 50);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 100);
camera.position.set(5, 4, 10);
camera.lookAt(0, 2, 0);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
document.body.appendChild(renderer.domElement);

const labelRenderer = new CSS2DRenderer();
labelRenderer.setSize(window.innerWidth, window.innerHeight);
labelRenderer.domElement.style.position = 'absolute';
labelRenderer.domElement.style.top = '0';
labelRenderer.domElement.style.pointerEvents = 'none';
document.body.appendChild(labelRenderer.domElement);

// ── 灯光 ──
const ambientLight = new THREE.AmbientLight(0x404060, 0.5);
scene.add(ambientLight);

const moonLight = new THREE.DirectionalLight(0x8888ff, 1.5);
moonLight.position.set(-5, 8, 5);
moonLight.castShadow = true;
moonLight.shadow.mapSize.width = 1024;
moonLight.shadow.mapSize.height = 1024;
scene.add(moonLight);

const fillLight = new THREE.DirectionalLight(0x4466ff, 0.3);
fillLight.position.set(3, 4, -5);
scene.add(fillLight);

const rimLight = new THREE.DirectionalLight(0x8888ff, 0.5);
rimLight.position.set(0, -2, -8);
scene.add(rimLight);

// ── 环境 ──
// 地面（仙台）
const groundGeo = new THREE.PlaneGeometry(30, 20);
const groundMat = new THREE.MeshStandardMaterial({
  color: 0x1a1a3e,
  roughness: 0.8,
  metalness: 0.1,
});
const ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = -0.1;
ground.receiveShadow = true;
scene.add(ground);

// 石板纹理辅助线
for(let i=0; i<20; i++){
  const lineGeo = new THREE.BoxGeometry(6, 0.02, 0.03);
  const lineMat = new THREE.MeshStandardMaterial({ color: 0x2a2a5e, transparent: true, opacity: 0.3 });
  const line = new THREE.Mesh(lineGeo, lineMat);
  line.position.set(0, 0.01, -3 + i * 0.6);
  scene.add(line);
}

// 远山
for(let i=0; i<5; i++){
  const mtnGeo = new THREE.ConeGeometry(1.5 + Math.random()*2, 2 + Math.random()*2, 6);
  const mtnMat = new THREE.MeshStandardMaterial({
    color: new THREE.Color().setHSL(0.68, 0.15, 0.12 + Math.random()*0.08),
    roughness: 0.9,
    metalness: 0,
  });
  const mtn = new THREE.Mesh(mtnGeo, mtnMat);
  mtn.position.set(-6 + i*3 + Math.random(), -0.5, -8 - Math.random()*4);
  mtn.castShadow = true;
  scene.add(mtn);
}

// 云朵（发光粒子）
const cloudParticles = new THREE.BufferGeometry();
const cloudCount = 200;
const positions = new Float32Array(cloudCount * 3);
for(let i=0; i<cloudCount; i++){
  positions[i*3] = (Math.random() - 0.5) * 20;
  positions[i*3+1] = 3 + Math.random() * 3;
  positions[i*3+2] = -5 - Math.random() * 8;
}
cloudParticles.setAttribute('position', new THREE.BufferAttribute(positions, 3));
const cloudMat = new THREE.PointsMaterial({
  color: 0x8899cc,
  size: 0.15,
  transparent: true,
  opacity: 0.3,
  blending: THREE.AdditiveBlending,
});
const clouds = new THREE.Points(cloudParticles, cloudMat);
scene.add(clouds);

// 灵气粒子
const particleCount = 500;
const particleGeo = new THREE.BufferGeometry();
const particlePos = new Float32Array(particleCount * 3);
const particleSizes = new Float32Array(particleCount);
for(let i=0; i<particleCount; i++){
  particlePos[i*3] = (Math.random() - 0.5) * 12;
  particlePos[i*3+1] = Math.random() * 6;
  particlePos[i*3+2] = (Math.random() - 0.5) * 8 - 2;
  particleSizes[i] = 0.02 + Math.random() * 0.06;
}
particleGeo.setAttribute('position', new THREE.BufferAttribute(particlePos, 3));
particleGeo.setAttribute('size', new THREE.BufferAttribute(particleSizes, 1));
const particleMat = new THREE.PointsMaterial({
  color: 0x6688ff,
  size: 0.04,
  transparent: true,
  opacity: 0.4,
  blending: THREE.AdditiveBlending,
});
const particles = new THREE.Points(particleGeo, particleMat);
scene.add(particles);

// 月亮
const moonGeo = new THREE.SphereGeometry(0.6, 32, 32);
const moonMat = new THREE.MeshStandardMaterial({
  color: 0xaaaacc,
  roughness: 0.2,
  metalness: 0.1,
  emissive: 0x6666aa,
  emissiveIntensity: 0.5,
});
const moon = new THREE.Mesh(moonGeo, moonMat);
moon.position.set(5, 6, -10);
scene.add(moon);

// 月光晕
const glowGeo = new THREE.SphereGeometry(0.9, 32, 32);
const glowMat = new THREE.MeshBasicMaterial({
  color: 0x8888ff,
  transparent: true,
  opacity: 0.08,
});
const glow = new THREE.Mesh(glowGeo, glowMat);
glow.position.copy(moon.position);
scene.add(glow);

// ── 小孩（3D 组装）──
const childGroup = new THREE.Group();
childGroup.position.set(-1.8, 0, 0);

// 身体
const bodyMat = new THREE.MeshStandardMaterial({ color: 0x5D4E37, roughness: 0.7 });
const body = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.7, 0.3), bodyMat);
body.position.y = 0.65;
body.castShadow = true;
childGroup.add(body);

// 头
const headMat = new THREE.MeshStandardMaterial({ color: 0xF5D6C6, roughness: 0.5 });
const head = new THREE.Mesh(new THREE.SphereGeometry(0.3, 24, 24), headMat);
head.position.y = 1.15;
head.castShadow = true;
childGroup.add(head);

// 发髻
const hairMat = new THREE.MeshStandardMaterial({ color: 0x2C1810, roughness: 0.8 });
const hair = new THREE.Mesh(new THREE.SphereGeometry(0.2, 16, 16), hairMat);
hair.position.set(0, 1.35, 0.2);
hair.scale.set(1, 0.5, 0.8);
childGroup.add(hair);

// 眼睛（黑点）
const eyeMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
const eyeL = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), eyeMat);
eyeL.position.set(-0.1, 1.15, 0.3);
childGroup.add(eyeL);
const eyeR = new THREE.Mesh(new THREE.SphereGeometry(0.04, 8, 8), eyeMat);
eyeR.position.set(0.1, 1.15, 0.3);
childGroup.add(eyeR);

// 左臂（伸出）
const armMat = new THREE.MeshStandardMaterial({ color: 0xF5D6C6, roughness: 0.5 });
const leftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.5, 8), armMat);
leftArm.position.set(0.35, 0.7, 0);
leftArm.rotation.z = -0.3;
leftArm.rotation.x = -0.5;
childGroup.add(leftArm);

// 袖子
const sleeveMat = new THREE.MeshStandardMaterial({ color: 0x5D4E37, roughness: 0.7 });
const sleeve = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.08, 0.25, 8), sleeveMat);
sleeve.position.set(0.25, 0.6, 0);
sleeve.rotation.z = -0.2;
childGroup.add(sleeve);

// 右臂
const rightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.4, 8), armMat);
rightArm.position.set(-0.35, 0.7, 0);
rightArm.rotation.z = 0.3;
childGroup.add(rightArm);

// 腿
const legMat = new THREE.MeshStandardMaterial({ color: 0x3E2723, roughness: 0.8 });
const legL = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.25, 8), legMat);
legL.position.set(-0.12, 0.2, 0);
childGroup.add(legL);
const legR = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.25, 8), legMat);
legR.position.set(0.12, 0.2, 0);
childGroup.add(legR);

scene.add(childGroup);

// ── 大人（3D 组装）──
const adultGroup = new THREE.Group();
adultGroup.position.set(1.8, 0, 0);

// 身体
const adultBodyMat = new THREE.MeshStandardMaterial({ color: 0x1a2744, roughness: 0.6, metalness: 0.1 });
const adultBody = new THREE.Mesh(new THREE.BoxGeometry(0.6, 0.85, 0.35), adultBodyMat);
adultBody.position.y = 0.75;
adultBody.castShadow = true;
adultGroup.add(adultBody);

// 头
const adultHeadMat = new THREE.MeshStandardMaterial({ color: 0xE8D5C0, roughness: 0.4 });
const adultHead = new THREE.Mesh(new THREE.SphereGeometry(0.32, 24, 24), adultHeadMat);
adultHead.position.y = 1.3;
adultHead.castShadow = true;
adultGroup.add(adultHead);

// 头发
const adultHairMat = new THREE.MeshStandardMaterial({ color: 0x111111, roughness: 0.9 });
const adultHair = new THREE.Mesh(new THREE.SphereGeometry(0.34, 16, 16), adultHairMat);
adultHair.position.set(0, 1.35, 0.1);
adultHair.scale.set(1, 0.4, 0.9);
adultGroup.add(adultHair);

// 发簪
const pinMat = new THREE.MeshStandardMaterial({ color: 0x8D6E63, roughness: 0.3, metalness: 0.2 });
const pin = new THREE.Mesh(new THREE.CylinderGeometry(0.01, 0.03, 0.25, 6), pinMat);
pin.position.set(0.25, 1.4, 0.1);
pin.rotation.x = 0.5;
pin.rotation.z = 0.3;
adultGroup.add(pin);

// 眼睛
const adultEyeL = new THREE.Mesh(new THREE.SphereGeometry(0.035, 8, 8), eyeMat);
adultEyeL.position.set(-0.12, 1.28, 0.32);
adultGroup.add(adultEyeL);
const adultEyeR = new THREE.Mesh(new THREE.SphereGeometry(0.035, 8, 8), eyeMat);
adultEyeR.position.set(0.12, 1.28, 0.32);
adultGroup.add(adultEyeR);

// 右手（伸出摸小孩）
const adultArmMat = new THREE.MeshStandardMaterial({ color: 0xE8D5C0, roughness: 0.4 });
const adultRightArm = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.5, 8), adultArmMat);
adultRightArm.position.set(-0.4, 0.85, 0);
adultRightArm.rotation.z = 0.4;
adultRightArm.rotation.x = -0.3;
adultGroup.add(adultRightArm);

// 袖袍
const adultSleeveMat = new THREE.MeshStandardMaterial({ color: 0x1a2744, roughness: 0.7 });
const adultSleeve = new THREE.Mesh(new THREE.CylinderGeometry(0.15, 0.1, 0.3, 8), adultSleeveMat);
adultSleeve.position.set(-0.3, 0.7, 0);
adultSleeve.rotation.z = 0.3;
adultGroup.add(adultSleeve);

// 左手
const adultLeftArm = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.07, 0.45, 8), adultArmMat);
adultLeftArm.position.set(0.4, 0.8, 0);
adultLeftArm.rotation.z = -0.3;
adultGroup.add(adultLeftArm);

// 腿
const adultLegMat = new THREE.MeshStandardMaterial({ color: 0x111, roughness: 0.8 });
const adultLegL = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.3, 8), adultLegMat);
adultLegL.position.set(-0.15, 0.25, 0);
adultGroup.add(adultLegL);
const adultLegR = new THREE.Mesh(new THREE.CylinderGeometry(0.08, 0.08, 0.3, 8), adultLegMat);
adultLegR.position.set(0.15, 0.25, 0);
adultGroup.add(adultLegR);

scene.add(adultGroup);

// ── 对话框（CSS2D）──
const bubbleDiv = document.createElement('div');
bubbleDiv.textContent = '你辛苦了';
bubbleDiv.style.color = '#2C1810';
bubbleDiv.style.fontFamily = '"KaiTi","STKaiti","Microsoft YaHei",serif';
bubbleDiv.style.fontSize = '32px';
bubbleDiv.style.fontWeight = 'bold';
bubbleDiv.style.background = 'rgba(245,240,230,0.92)';
bubbleDiv.style.border = '2px solid #8D7B5B';
bubbleDiv.style.borderRadius = '12px';
bubbleDiv.style.padding = '12px 28px';
bubbleDiv.style.boxShadow = '0 4px 20px rgba(0,0,0,0.3)';
bubbleDiv.style.letterSpacing = '4px';

const bubbleLabel = new CSS2DObject(bubbleDiv);
bubbleLabel.position.set(2.5, 3.5, 0);
scene.add(bubbleLabel);

// 副标题
const subDiv = document.createElement('div');
subDiv.textContent = '小时候的我，摸摸长大的自己';
subDiv.style.color = 'rgba(180,190,220,0.5)';
subDiv.style.fontFamily = '"KaiTi","STKaiti","Microsoft YaHei",serif';
subDiv.style.fontSize = '16px';
subDiv.style.letterSpacing = '2px';
const subLabel = new CSS2DObject(subDiv);
subLabel.position.set(0, -0.8, 0);
scene.add(subLabel);

// ── 动画循环 ──
let time = 0;

function animate(){
  requestAnimationFrame(animate);
  time += 0.016;

  // 小孩轻轻晃动
  childGroup.position.y = Math.sin(time * 1.2) * 0.03;
  // 手臂伸展
  leftArm.rotation.x = -0.5 + Math.sin(time * 1.8) * 0.15;
  leftArm.rotation.z = -0.3 + Math.sin(time * 1.8) * 0.08;

  // 大人微微晃动
  adultGroup.position.y = Math.sin(time * 1.0 + 0.5) * 0.02;
  // 摸头的手
  adultRightArm.rotation.z = 0.4 + Math.sin(time * 0.8) * 0.05;

  // 粒子动画
  const pos = particles.geometry.attributes.position.array;
  for(let i=0; i<particleCount; i++){
    pos[i*3+1] += 0.003;
    if(pos[i*3+1] > 6) pos[i*3+1] = 0;
    pos[i*3] += Math.sin(time + i) * 0.002;
  }
  particles.geometry.attributes.position.needsUpdate = true;

  // 云动
  clouds.position.x = Math.sin(time * 0.05) * 0.5;

  // 镜头微动
  camera.position.x = 5 + Math.sin(time * 0.1) * 0.2;
  camera.position.y = 4 + Math.sin(time * 0.08) * 0.1;
  camera.lookAt(0, 2, 0);

  // 对话框闪烁
  bubbleLabel.visible = Math.sin(time * 0.7) > 0.1;

  renderer.render(scene, camera);
  labelRenderer.render(scene, camera);
}

animate();

// ── 自适应 ──
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
  labelRenderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
